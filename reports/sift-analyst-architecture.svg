  <text x="997" y="163" text-anchor="middle" fill="#c9d1d9" font-size="9">reports/*.md</text>
  <text x="997" y="176" text-anchor="middle" fill="#8b949e" font-size="9">timeline · IOCs · findings</text>

  <!-- ── NODE 7b: Exports ── -->
  <rect x="925" y="208" width="145" height="58" rx="8" fill="#1c2318" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="925" y="208" width="145" height="16" rx="8" fill="#3fb950" opacity="0.25"/>
  <text x="997" y="220" text-anchor="middle" fill="#56d364" font-size="10" font-weight="600">EXPORTS</text>
  <text x="997" y="236" text-anchor="middle" fill="#c9d1d9" font-size="9">exports/*.csv  *.json</text>
  <text x="997" y="249" text-anchor="middle" fill="#8b949e" font-size="9">netstat · mft · evtx</text>

  <!-- ── NODE 7c: YARA Hits ── -->
  <rect x="925" y="281" width="145" height="58" rx="8" fill="#1c2318" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="925" y="281" width="145" height="16" rx="8" fill="#3fb950" opacity="0.25"/>
  <text x="997" y="293" text-anchor="middle" fill="#56d364" font-size="10" font-weight="600">YARA / IOC HITS</text>
  <text x="997" y="309" text-anchor="middle" fill="#c9d1d9" font-size="9">analysis/yara_hits.txt</text>
  <text x="997" y="322" text-anchor="middle" fill="#8b949e" font-size="9">STUN · msedge · pssdnsvc</text>

  <!-- ─── ARROWS ─── -->
  <!-- 1 → 2 -->
  <line x1="170" y1="171" x2="205" y2="171" stroke="#388bfd" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- 2 → 3a -->
  <line x1="345" y1="155" x2="380" y2="151" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <!-- 2 → 3b -->
  <line x1="345" y1="171" x2="380" y2="221" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <!-- 2 → 3c -->
  <line x1="345" y1="185" x2="380" y2="291" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <!-- 2 → 3d -->
  <line x1="345" y1="200" x2="380" y2="361" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- 3 group → 4 (from midpoint of analysis tools) -->
  <line x1="520" y1="151" x2="555" y2="230" stroke="#bc8cff" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="520" y1="221" x2="555" y2="240" stroke="#bc8cff" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="520" y1="291" x2="555" y2="250" stroke="#bc8cff" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="520" y1="361" x2="555" y2="265" stroke="#bc8cff" stroke-width="1.5" marker-end="url(#arr-purple)"/>

  <!-- 4 → 5 -->
  <line x1="695" y1="235" x2="730" y2="210" stroke="#f78166" stroke-width="2" marker-end="url(#arr-red)"/>

  <!-- 5 → 6 -->
  <line x1="810" y1="260" x2="810" y2="290" stroke="#f0883e" stroke-width="2" marker-end="url(#arr-orange)"/>

  <!-- 6 → 5 (feedback loop — curved left side) -->
  <path d="M 730 335 C 700 335 700 205 730 205" fill="none" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-orange)"/>
  <text x="690" y="278" text-anchor="middle" fill="#ffa657" font-size="9" transform="rotate(-90,690,278)">retry</text>

  <!-- 5 → 7a -->
  <line x1="890" y1="185" x2="925" y2="164" stroke="#56d364" stroke-width="1.5" marker-end="url(#arr-green2)"/>
  <!-- 5 → 7b -->
  <line x1="890" y1="205" x2="925" y2="237" stroke="#56d364" stroke-width="1.5" marker-end="url(#arr-green2)"/>
  <!-- 6 → 7c -->
  <line x1="890" y1="335" x2="925" y2="310" stroke="#56d364" stroke-width="1.5" marker-end="url(#arr-green2)"/>

  <!-- 3 → 5 direct (raw artifacts) -->
  <path d="M 520 248 C 600 248 660 205 730 195" fill="none" stroke="#bc8cff" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-purple)"/>

  <!-- ─── ARROWHEAD MARKERS ─── -->
  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#388bfd"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3fb950"/>
    </marker>
    <marker id="arr-green2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#56d364"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#bc8cff"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f78166"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f0883e"/>
    </marker>
  </defs>

  <!-- ─── LEGEND ─── -->
  <rect x="20" y="490" width="1060" height="100" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="550" y="507" text-anchor="middle" fill="#8b949e" font-size="10" font-weight="600" letter-spacing="1">LEGEND</text>

  <!-- Legend items -->
