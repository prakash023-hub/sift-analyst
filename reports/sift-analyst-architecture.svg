  <text x="55" y="529" fill="#c9d1d9" font-size="10">E01 Evidence (read-only)</text>

  <rect x="200" y="518" width="14" height="14" rx="3" fill="#1c2b1c" stroke="#3fb950" stroke-width="1.5"/>
  <text x="220" y="529" fill="#c9d1d9" font-size="10">Mount / Output</text>

  <rect x="345" y="518" width="14" height="14" rx="3" fill="#1e1c2b" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="365" y="529" fill="#c9d1d9" font-size="10">Forensic Tools</text>

  <rect x="480" y="518" width="14" height="14" rx="3" fill="#2b1c1c" stroke="#f78166" stroke-width="1.5"/>
  <text x="500" y="529" fill="#c9d1d9" font-size="10">ML Anomaly Scorer</text>

  <rect x="640" y="518" width="14" height="14" rx="3" fill="#1c2318" stroke="#56d364" stroke-width="2"/>
  <text x="660" y="529" fill="#c9d1d9" font-size="10">Claude Code Agent</text>

  <rect x="800" y="518" width="14" height="14" rx="3" fill="#231c1c" stroke="#f0883e" stroke-width="1.5"/>
  <text x="820" y="529" fill="#c9d1d9" font-size="10">Self-Correction Loop</text>

  <!-- dashed = passthrough label -->
  <line x1="35" y1="556" x2="65" y2="556" stroke="#bc8cff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="72" y="560" fill="#8b949e" font-size="10">raw artifact passthrough (CSV/JSON)</text>

  <line x1="300" y1="556" x2="330" y2="556" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="337" y="560" fill="#8b949e" font-size="10">feedback / retry path</text>

  <text x="700" y="560" fill="#8b949e" font-size="10">All evidence paths: read-only · Outputs → ./exports/  ./reports/</text>

  <!-- ─── VERSION STAMP ─── -->
  <text x="1080" y="612" text-anchor="end" fill="#30363d" font-size="9">SIFT-Analyst v1.0 · FOR508 · 2026-05-26</text>

