  <text x="450" y="219" text-anchor="middle" fill="#c9d1d9" font-size="9">MFTECmd · EvtxECmd</text>
  <text x="450" y="232" text-anchor="middle" fill="#8b949e" font-size="9">AmcacheParser · RECmd</text>

  <!-- ── NODE 3c: Volatility 3 ── -->
  <rect x="380" y="262" width="140" height="58" rx="8" fill="#1e1c2b" stroke="#bc8cff" stroke-width="1.5"/>
  <rect x="380" y="262" width="140" height="16" rx="8" fill="#bc8cff" opacity="0.25"/>
  <text x="450" y="274" text-anchor="middle" fill="#d2a8ff" font-size="10" font-weight="600">VOLATILITY 3</text>
  <text x="450" y="289" text-anchor="middle" fill="#c9d1d9" font-size="9">pstree · cmdline · netstat</text>
  <text x="450" y="302" text-anchor="middle" fill="#8b949e" font-size="9">dlllist · getsids · malfind</text>

  <!-- ── NODE 3d: Plaso ── -->
  <rect x="380" y="332" width="140" height="58" rx="8" fill="#1e1c2b" stroke="#bc8cff" stroke-width="1.5"/>
  <rect x="380" y="332" width="140" height="16" rx="8" fill="#bc8cff" opacity="0.25"/>
  <text x="450" y="344" text-anchor="middle" fill="#d2a8ff" font-size="10" font-weight="600">PLASO</text>
  <text x="450" y="359" text-anchor="middle" fill="#c9d1d9" font-size="9">log2timeline.py · psort.py</text>
  <text x="450" y="372" text-anchor="middle" fill="#8b949e" font-size="9">supertimeline (UTC)</text>

  <!-- ── NODE 4: ML Anomaly Scorer ── -->
  <rect x="555" y="185" width="140" height="100" rx="8" fill="#2b1c1c" stroke="#f78166" stroke-width="1.5"/>
  <rect x="555" y="185" width="140" height="18" rx="8" fill="#f78166" opacity="0.25"/>
  <text x="625" y="199" text-anchor="middle" fill="#ffa198" font-size="10" font-weight="600">ML ANOMALY SCORER</text>
  <text x="625" y="217" text-anchor="middle" fill="#c9d1d9" font-size="9">IsolationForest</text>
  <text x="625" y="230" text-anchor="middle" fill="#c9d1d9" font-size="9">feature extraction</text>
  <text x="625" y="243" text-anchor="middle" fill="#8b949e" font-size="9">process · network · file</text>
  <text x="625" y="256" text-anchor="middle" fill="#8b949e" font-size="9">→ anomaly score [-1,+1]</text>
  <text x="625" y="270" text-anchor="middle" fill="#ffa198" font-size="9" font-weight="600">★ unique differentiator</text>

  <!-- ── NODE 5: Claude Code Agent ── -->
  <rect x="730" y="150" width="160" height="110" rx="8" fill="#1c2318" stroke="#56d364" stroke-width="2"/>
  <rect x="730" y="150" width="160" height="20" rx="8" fill="#56d364" opacity="0.3"/>
  <text x="810" y="165" text-anchor="middle" fill="#56d364" font-size="10" font-weight="700">CLAUDE CODE AGENT</text>
  <text x="810" y="183" text-anchor="middle" fill="#c9d1d9" font-size="9">claude-sonnet-4-6</text>
  <text x="810" y="196" text-anchor="middle" fill="#c9d1d9" font-size="9">orchestrates all skills</text>
  <text x="810" y="209" text-anchor="middle" fill="#8b949e" font-size="9">tool use · chain-of-thought</text>
  <text x="810" y="222" text-anchor="middle" fill="#8b949e" font-size="9">reads exports/  writes reports/</text>
  <text x="810" y="240" text-anchor="middle" fill="#56d364" font-size="9" font-weight="600">evidence read-only policy</text>

  <!-- ── NODE 6: Self-Correction Loop ── -->
  <rect x="730" y="290" width="160" height="90" rx="8" fill="#231c1c" stroke="#f0883e" stroke-width="1.5"/>
  <rect x="730" y="290" width="160" height="18" rx="8" fill="#f0883e" opacity="0.25"/>
  <text x="810" y="304" text-anchor="middle" fill="#ffa657" font-size="10" font-weight="600">SELF-CORRECTION LOOP</text>
  <text x="810" y="321" text-anchor="middle" fill="#c9d1d9" font-size="9">stderr → hypothesis → fix</text>
  <text x="810" y="334" text-anchor="middle" fill="#c9d1d9" font-size="9">re-run on tool failure</text>
  <text x="810" y="347" text-anchor="middle" fill="#8b949e" font-size="9">verify → retry → escalate</text>
  <text x="810" y="360" text-anchor="middle" fill="#8b949e" font-size="9">max 3 iterations / step</text>

  <!-- ── NODE 7a: IR Report ── -->
  <rect x="925" y="135" width="145" height="58" rx="8" fill="#1c2318" stroke="#3fb950" stroke-width="1.5"/>
