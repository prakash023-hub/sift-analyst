<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" font-family="'Segoe UI', 'Liberation Sans', Arial, sans-serif">

  <!-- Background -->
  <rect width="1100" height="620" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="550" y="42" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="700" letter-spacing="1">SIFT-Analyst — Autonomous IR Agent Flow</text>
  <text x="550" y="62" text-anchor="middle" fill="#8b949e" font-size="12">SANS FOR508 · FINDEVIL-001 · Stark Research Labs</text>

  <!-- ─── LANE BACKGROUNDS ─── -->
  <!-- Evidence lane -->
  <rect x="20" y="85" width="160" height="480" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="100" y="107" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">EVIDENCE</text>

  <!-- Mounting lane -->
  <rect x="195" y="85" width="160" height="480" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="275" y="107" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">MOUNT</text>

  <!-- Analysis lane -->
  <rect x="370" y="85" width="160" height="480" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="107" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">ANALYSIS</text>

  <!-- ML lane -->
  <rect x="545" y="85" width="160" height="480" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="625" y="107" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">ML SCORING</text>

  <!-- Agent lane -->
  <rect x="720" y="85" width="180" height="480" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="810" y="107" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">CLAUDE AGENT</text>

  <!-- Report lane -->
  <rect x="915" y="85" width="165" height="480" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="997" y="107" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">OUTPUT</text>

  <!-- ─── NODE HELPER: rounded rect + icon area ─── -->

  <!-- ── NODE 1: E01 Image ── -->
  <rect x="30" y="135" width="140" height="72" rx="8" fill="#1c2b3a" stroke="#388bfd" stroke-width="1.5"/>
  <rect x="30" y="135" width="140" height="18" rx="8" fill="#388bfd" opacity="0.25"/>
  <text x="100" y="149" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="600">E01 IMAGE</text>
  <text x="100" y="167" text-anchor="middle" fill="#c9d1d9" font-size="10">base-rd01-cdrive.E01</text>
  <text x="100" y="180" text-anchor="middle" fill="#8b949e" font-size="9">base-dc-cdrive.E01</text>
  <text x="100" y="193" text-anchor="middle" fill="#8b949e" font-size="9">rd01-memory.img</text>

  <!-- ── NODE 2: EWF Mount ── -->
  <rect x="205" y="135" width="140" height="72" rx="8" fill="#1c2b1c" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="205" y="135" width="140" height="18" rx="8" fill="#3fb950" opacity="0.25"/>
  <text x="275" y="149" text-anchor="middle" fill="#56d364" font-size="10" font-weight="600">EWF MOUNT</text>
  <text x="275" y="167" text-anchor="middle" fill="#c9d1d9" font-size="10">ewfmount → /mnt/ewf_rd01</text>
  <text x="275" y="180" text-anchor="middle" fill="#8b949e" font-size="9">mount -o ro,loop,noatime</text>
  <text x="275" y="193" text-anchor="middle" fill="#8b949e" font-size="9">/mnt/rd01  /mnt/dc01</text>

  <!-- ── NODE 3a: Sleuth Kit ── -->
  <rect x="380" y="122" width="140" height="58" rx="8" fill="#1e1c2b" stroke="#bc8cff" stroke-width="1.5"/>
  <rect x="380" y="122" width="140" height="16" rx="8" fill="#bc8cff" opacity="0.25"/>
  <text x="450" y="134" text-anchor="middle" fill="#d2a8ff" font-size="10" font-weight="600">SLEUTH KIT</text>
  <text x="450" y="149" text-anchor="middle" fill="#c9d1d9" font-size="9">fls / icat / ils / blkls</text>
  <text x="450" y="162" text-anchor="middle" fill="#8b949e" font-size="9">mactime · tsk_recover</text>

  <!-- ── NODE 3b: EZ Tools ── -->
  <rect x="380" y="192" width="140" height="58" rx="8" fill="#1e1c2b" stroke="#bc8cff" stroke-width="1.5"/>
  <rect x="380" y="192" width="140" height="16" rx="8" fill="#bc8cff" opacity="0.25"/>
